{% extends 'base.html' %}

{% block title %}Contact Us - Apex Coaching{% endblock %}

{% block content %}
<h1 class="section-title animate-fade-up">Get in Touch</h1>
<p class="text-center animate-fade-up delay-100" style="margin-bottom: 2rem; color: var(--text-light);">Have questions about our JEE/NEET programs? We're here to help.</p>

<div class="form-container animate-fade-up delay-200">
    <form method="POST">
        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" name="message" class="form-control" required></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
    </form>
</div>
{% endblock %}
