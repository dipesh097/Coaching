{% extends 'base.html' %}

{% block title %}Sign In - Apex Coaching{% endblock %}

{% block content %}
<div class="split-layout animate-fade-up">
    <div class="split-image">
        <div class="split-image-text">
            <h2>Welcome Back!</h2>
            <p>Sign in to access your course material, mock tests, and performance analytics.</p>
        </div>
    </div>
    <div class="split-form">
        <h2 style="margin-bottom: 2rem; color: var(--text-dark);">Sign In</h2>
        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>
        <p style="margin-top: 2rem; text-align: center; color: var(--text-light);">
            Don't have an account? <a href="{{ url_for('signup') }}" style="color: var(--primary-color); font-weight: 500; text-decoration: none;">Sign up here</a>.
        </p>
    </div>
</div>
{% endblock %}
